<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cursorful Core Replica Studio</title>
    <link rel="stylesheet" href="studio.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>Cursorful Core Replica Studio</h1>
      <div class="row">
        <button id="startRecording">开始录制</button>
        <button id="stopRecording" disabled>停止录制</button>
        <span id="recordingStatus">未录制</span>
      </div>
    </header>

    <main class="layout">
      <section class="panel preview">
        <h2>预览</h2>
        <canvas id="previewCanvas" width="960" height="540"></canvas>
        <div class="row">
          <button id="playPreview" disabled>播放预览</button>
          <button id="pausePreview" disabled>暂停</button>
          <label>
            时间
            <input id="seekBar" type="range" min="0" max="0" value="0" step="0.01" />
          </label>
        </div>
        <div class="row">
          <label>
            比例
            <select id="aspectRatio">
              <option value="original">原比例</option>
              <option value="16:9">16:9</option>
              <option value="9:16">9:16</option>
              <option value="1:1">1:1</option>
            </select>
          </label>
          <label>
            <input id="showBrowserFrame" type="checkbox" checked />
            显示浏览器边框
          </label>
        </div>
        <div class="row">
          <button id="exportVideo" disabled>导出本地视频</button>
          <a id="downloadLink" class="hidden" download="cursorful-core-export.webm">下载导出结果</a>
        </div>
      </section>

      <section class="panel controls">
        <h2>自动缩放时间线</h2>
        <p id="timelineHint">录制后会根据点击自动生成缩放片段，可在此编辑。</p>
        <button id="addZoomEvent" disabled>添加缩放片段</button>
        <div id="timelineList"></div>

        <h2>背景</h2>
        <div class="background-grid">
          <label><input type="radio" name="backgroundMode" value="none" checked /> 无背景</label>
          <label><input type="radio" name="backgroundMode" value="color" /> 纯色</label>
          <label><input type="radio" name="backgroundMode" value="gradient" /> 渐变</label>
          <label><input type="radio" name="backgroundMode" value="image" /> 图片</label>
        </div>
        <div class="row">
          <label>纯色 <input id="bgColor" type="color" value="#111827" /></label>
          <label>渐变 A <input id="bgGradientA" type="color" value="#1d4ed8" /></label>
          <label>渐变 B <input id="bgGradientB" type="color" value="#9333ea" /></label>
        </div>
        <div class="row">
          <label>
            背景图片
            <input id="bgImage" type="file" accept="image/*" />
          </label>
        </div>
      </section>
    </main>

    <video id="sourceVideo" class="hidden" crossorigin="anonymous"></video>
    <script type="module" src="studio.js"></script>
  </body>
</html>
