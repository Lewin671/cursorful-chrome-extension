<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cursorful · 录制工作台</title>
  <link rel="stylesheet" href="studio.css" />
</head>

<body>
  <!-- 顶部导航栏 -->
  <header class="topbar">
    <div class="topbar-brand">
      <span class="brand-icon">⏺</span>
      <span class="brand-name">Cursorful</span>
    </div>
    <div class="topbar-controls">
      <span id="recordingStatus" class="status-badge status-idle">就绪</span>
      <button id="startRecording" class="btn btn-record">
        <span class="btn-icon">▶</span> 开始录制
      </button>
      <button id="pauseRecording" class="btn btn-secondary hidden" disabled>
        <span class="btn-icon">⏸</span> 暂停
      </button>
      <button id="resumeRecording" class="btn btn-record hidden" disabled>
        <span class="btn-icon">▶</span> 继续
      </button>
      <button id="stopRecording" class="btn btn-stop" disabled>
        <span class="btn-icon">⏹</span> 停止录制
      </button>
    </div>
  </header>

  <div id="statusBanner" class="status-banner hidden"></div>

  <!-- 主内容区 -->
  <main class="main">

    <!-- 空状态：录制前 -->
    <section id="emptyState" class="empty-state">
      <div class="empty-icon">🎬</div>
      <h2>准备录制</h2>
      <p>点击"开始录制"，选择屏幕或标签页，自动追踪鼠标轨迹。</p>
      <div class="steps">
        <div class="step">
          <span class="step-num">1</span>
          <span>点击 <strong>开始录制</strong></span>
        </div>
        <div class="step-arrow">→</div>
        <div class="step">
          <span class="step-num">2</span>
          <span>选择屏幕 / 标签页</span>
        </div>
        <div class="step-arrow">→</div>
        <div class="step">
          <span class="step-num">3</span>
          <span>停止后 <strong>直接下载</strong></span>
        </div>
      </div>
    </section>

    <!-- 录制中状态 -->
    <section id="recordingState" class="recording-state hidden">
      <div class="rec-indicator">
        <span class="rec-dot"></span>
        <span class="rec-label">REC</span>
      </div>
      <div class="rec-timer" id="recTimer">00:00</div>
      <p class="rec-hint" id="recHint">录制进行中，点击“停止录制”完成。</p>
    </section>

    <section id="pausedState" class="recording-state hidden">
      <div class="rec-indicator">
        <span class="rec-dot rec-dot-paused"></span>
        <span class="rec-label rec-label-paused">PAUSED</span>
      </div>
      <div class="rec-timer" id="pauseTimer">00:00</div>
      <p class="rec-hint">录制已暂停，可继续或直接停止。</p>
    </section>

    <section id="processingState" class="recording-state hidden">
      <div class="rec-indicator">
        <span class="rec-dot rec-dot-processing"></span>
        <span class="rec-label rec-label-processing">PROCESSING</span>
      </div>
      <div class="rec-timer rec-timer-processing">处理中</div>
      <p class="rec-hint">正在整理录制结果并生成预览。</p>
    </section>

    <!-- 预览区：录制完成后 -->
    <section id="previewState" class="preview-state hidden">
      <div class="preview-header">
        <h2>录制完成</h2>
        <div class="preview-meta" id="previewMeta"></div>
      </div>
      <div class="video-container">
        <video id="previewVideo" controls playsinline></video>
      </div>
      <div class="preview-actions">
        <button id="downloadBtn" class="btn btn-download">
          <span class="btn-icon">⬇</span> 下载录制文件
        </button>
        <button id="reRecordBtn" class="btn btn-secondary">
          <span class="btn-icon">↺</span> 重新录制
        </button>
      </div>
    </section>

  </main>

  <script type="module" src="studio.js"></script>
</body>

</html>
